<!DOCTYPE html>
<html>

<head>

    <title>PhishGuard AI - History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

    <div class="logo">

        🛡️ PhishGuard AI

    </div>

</header>

<div class="container">

    <h1>Analysis History</h1>

    <table class="history-table">

        <tr>

            <th>ID</th>
            <th>Sender</th>
            <th>Subject</th>
            <th>Domain</th>
            <th>Threat Score</th>
            <th>Risk</th>
            <th>VirusTotal</th>
            <th>Country</th>
            <th>Date</th>

        </tr>

        {% for row in history %}

        <tr>

            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>{{ row[6] }}</td>
            <td>{{ row[7] }}</td>
            <td>{{ row[8] }}</td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/" class="analyze-btn">

        ← Back to Dashboard

    </a>

</div>

</body>

</html>
